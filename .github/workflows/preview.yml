name: Preview Docker Image on Render

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

env:
  DOCKERHUB_REPOSITORY_URL: REPLACE_ME
  WEBSITE_URL: https://bronxbot.xyz

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag $DOCKERHUB_REPOSITORY_URL:$(date +%s)

      - name: Log in to Docker Hub
        uses: docker/login-action@v2.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Docker Metadata action
        uses: docker/metadata-action@v4.6.0
        id: meta
        with:
          images: ${{ env.DOCKERHUB_REPOSITORY_URL }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4.1.1
        id: build
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Notify website of new preview
        if: github.event_name == 'pull_request'
        run: |
          curl -X POST ${{ env.WEBSITE_URL }}/api/bot/preview \
            -H "X-API-Key: ${{ secrets.BOT_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "commit_sha": "${{ github.sha }}",
              "branch": "${{ github.head_ref }}",
              "preview_url": "https://bronx-site-preview-${{ github.event.pull_request.number }}.onrender.com",
              "dashboard_url": "https://dashboard.render.com/web/${{ secrets.RENDER_SERVICE_ID }}/previews"
            }'
